                  - { label: Image Path, name: src, widget: string }
                  - { label: Alt Text, name: alt, widget: string }
                  - { label: Width, name: width, widget: number, default: 1365 }
                  - { label: Height, name: height, widget: number, default: 2048 }
              - { label: Features Eyebrow, name: featuresEyebrow, widget: string }
              - { label: Features Title, name: featuresTitle, widget: string }
              - { label: Creativity Eyebrow, name: creativityEyebrow, widget: string }
              - { label: Creativity Title, name: creativityTitle, widget: string }
              - { label: Creativity Body (First Paragraph), name: creativityBodyOne, widget: text }
              - { label: Creativity Body (Second Paragraph), name: creativityBodyTwo, widget: text }
              - { label: Final Section Eyebrow, name: finalEyebrow, widget: string }
              - { label: Final Section Title, name: finalTitle, widget: string }
              - { label: Final Section Description, name: finalDescription, widget: text }

      - name: gallery
        label: Gallery Page
        file: content/pages/gallery.json
        format: json
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - label: Featured Image
