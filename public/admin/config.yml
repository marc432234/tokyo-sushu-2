                  - { label: Alt Text, name: alt, widget: string }
                  - { label: Width, name: width, widget: number, default: 1365 }
                  - { label: Height, name: height, widget: number, default: 2048 }
          - label: CTA
            name: cta
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Button Label, name: buttonLabel, widget: string }

      - name: contact
        label: Contact Page
        file: content/pages/contact.json
        format: json
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - label: Hero Image
                name: image
                widget: object
                fields:
                  - { label: Image Path, name: src, widget: string }
                  - { label: Alt Text, name: alt, widget: string }
                  - { label: Width, name: width, widget: number, default: 1365 }
                  - { label: Height, name: height, widget: number, default: 2048 }
              - { label: Primary Button Label, name: primaryButtonLabel, widget: string }
              - label: Secondary Button
                name: secondaryButton
                widget: object
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
